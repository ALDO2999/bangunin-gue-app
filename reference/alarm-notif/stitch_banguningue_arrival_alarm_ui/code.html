<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        body {
            background-color: #11131a; /* Updated to surface color from DESIGN_SYSTEM_7 */
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col h-screen w-full font-body-lg text-on-surface antialiased bg-background">
<!-- Screen Content: Alarm Triggered -->
<main class="flex-1 flex flex-col items-center justify-between py-16 px-margin-mobile relative z-10">
<!-- Header Info -->
<div class="text-center mt-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white mb-2">Almost There!</h1>
<p class="font-title-md text-title-md text-secondary">Arriving at Grand Central Terminal</p>
</div>
<!-- Center Animation Section -->
<div class="relative flex items-center justify-center w-full h-80">
<!-- Pulsing Rings (Layered Flat Circles) -->
<div class="absolute w-40 h-40 rounded-full border-4 border-secondary/20 animate-pulse-ring" style="animation-delay: 0s;"></div>
<div class="absolute w-40 h-40 rounded-full border-4 border-secondary/30 animate-pulse-ring" style="animation-delay: 1s;"></div>
<div class="absolute w-40 h-40 rounded-full border-4 border-secondary/40 animate-pulse-ring" style="animation-delay: 2s;"></div>
<!-- Central Core -->
<div class="z-20 w-32 h-32 rounded-full bg-secondary flex items-center justify-center transition-transform active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-secondary text-[64px]" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
</div>
<!-- Call to Action -->
<div class="w-full flex flex-col gap-gutter items-center mb-base">
<button class="w-full max-w-sm py-md px-lg bg-surface-container-highest rounded-full flex items-center justify-center transition-all active:scale-[0.98] border border-outline/20">
<span class="font-title-md text-title-md text-white">Stop Alarm</span>
</button>
<button class="w-full max-w-sm py-base px-md text-secondary border border-secondary/20 rounded-full transition-all active:bg-secondary/10">
<span class="font-label-caps text-label-caps">Snooze for 2 min</span>
</button>
</div>
</main>
<!-- Visual Atmosphere -->
<div class="fixed inset-0 pointer-events-none opacity-20 bg-gradient-to-b from-primary/5 to-transparent">
</div>
<!-- Micro-interaction for tactile feedback -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(50);
                }
            });
        });

        // Simulating rhythmic vibration logic for an active alarm
        let alarmActive = true;
        const triggerVibration = () => {
            if (!alarmActive) return;
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate([200, 100, 200]);
            }
            setTimeout(triggerVibration, 2000);
        };
        
        // triggerVibration();
    </script>
</body></html>
