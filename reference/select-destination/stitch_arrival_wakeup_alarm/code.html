<style>

        input[type="range"]::-webkit-slider-thumb {

        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .animate-pulse-ring {
            animation: pulse-ring 3s infinite ease-in-out;
        }

<!-- Interactive Logic -->
<script>
        const slider = document.getElementById('radiusSlider');
        const radiusValue = document.getElementById('radiusValue');
        const overlay = document.getElementById('radiusOverlay');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            // Update label
            if (val >= 1000) {
                radiusValue.textContent = (val / 1000).toFixed(1) + 'km';
            } else {
                radiusValue.textContent = val + 'm';
            }

            // Scale visual overlay (clamped between 150px and 450px)
            const minPx = 150;
            const maxPx = 450;
            const percentage = (val - 200) / (2000 - 200);
            const size = minPx + (percentage * (maxPx - minPx));
            
            overlay.style.width = size + 'px';
            overlay.style.height = size + 'px';
        });

        // Simple haptic-like scaling on buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.classList.add('scale-95');
            });
            btn.addEventListener('touchend', () => {
                btn.classList.remove('scale-95');
            });
        });
    </script>
